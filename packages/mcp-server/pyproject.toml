[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[project]
name = "ivanston-memory-mcp"
version = "0.1.0"
description = "Agent 记忆系统 MCP 服务 — 为 Claude Code / Cursor 等 AI 客户端提供持久记忆能力"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "httpx>=0.27.0",
    "chromadb>=0.5.0",
    "fastembed>=0.5.0,<0.6.0",
    "fastmcp>=0.3.0",
]

[project.scripts]
agent-memory = "agent_memory_mcp.cli:main"

[tool.setuptools.packages.find]
where = ["src"]
include = ["agent_memory_mcp*"]
