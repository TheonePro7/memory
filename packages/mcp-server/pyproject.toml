[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[project]
name = "agent-memory-mcp"
version = "0.1.0"
description = "Agent 记忆系统 MCP 服务"
requires-python = ">=3.10"
dependencies = [
    "httpx>=0.27.0",
    "chromadb>=0.5.0",
    "fastembed>=0.5.0",
    "fastmcp>=0.3.0",
]

[project.scripts]
agent-memory = "cli:main"

[tool.setuptools.packages.find]
where = ["src"]
